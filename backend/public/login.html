<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstatePro - Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>🏢 EstatePro</h1>
            <p>Service Charge Management System</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="emailname@email.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" id="toggle-password" class="toggle-password" onclick="togglePassword()" title="Show/hide password">
                        <i class="ph ph-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <div class="btn-content">
                    <div class="loading-spinner" id="spinner"></div>
                    <span id="btnText">Login</span>
                </div>
            </button>
        </form>

        <div class="footer-text">
            For estate committee members only<br>
            <a href="#support">Need help?</a>
        </div>
    </div>

    <script src="./js/login.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            icon.className = show ? 'ph ph-eye-slash' : 'ph ph-eye';
        }
    </script>
</body>
</html>
