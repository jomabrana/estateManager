<link rel="stylesheet" href="/styles/index.css">
<link rel="stylesheet" href="/styles/add-payment.css">
<script src="/js/add-payment.js"></script>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Record Payment</h2>
    </div>
    
    <form id="payment-form">
        <div class="form-group">
            <label>Resident/Invoice *</label>
            <select id="payment-invoice" required>
                <option value="">Select...</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Amount (KES) *</label>
            <input type="number" id="payment-amount" placeholder="5500" required>
        </div>
        
        <div class="form-group">
            <label>Payment Method *</label>
            <select id="payment-method" required>
                <option value="">Select...</option>
                <option value="MPESA">M-Pesa</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
                <option value="CASH">Cash</option>
                <option value="CHECK">Check</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Payment Date *</label>
            <input type="date" id="payment-date" required>
        </div>
        
        <div class="form-actions">
            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                                    Back
                                </button>
            <button type="submit" class="btn btn-primary">Record Payment</button>
        </div>
    </form>
</div>
