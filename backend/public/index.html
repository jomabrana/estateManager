<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstatePro | Dashboard</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="/styles/mobile.css">
    <script src="/js/index.js"></script>
</head>
<body>
    <div class="dashboard-container">

        <!-- SIDEBAR (desktop only) -->
        <nav class="sidebar">
            <div class="logo">
                <i class="ph-bold ph-buildings"></i>
                <span>EstatePro</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-link active" data-page="dashboard" onclick="loadPage('dashboard'); return false;">
                    <i class="ph ph-squares-four"></i><span>Dashboard</span>
                </a></li>
                <li><a href="#" class="nav-link" data-page="residents" onclick="loadPage('residents'); return false;">
                    <i class="ph ph-users"></i><span>Residents</span>
                </a></li>
                <li><a href="#" class="nav-link" data-page="invoices" onclick="loadPage('invoices'); return false;">
                    <i class="ph ph-receipt"></i><span>Invoices</span>
                </a></li>
                <li><a href="#" class="nav-link" data-page="payments" onclick="loadPage('payments'); return false;">
                    <i class="ph ph-hand-coins"></i><span>Payments</span>
                </a></li>               
                <li><a href="#" class="nav-link" data-page="collections" onclick="loadPage('collections'); return false;">
                    <i class="ph ph-warning-circle"></i><span>Collections</span>
                </a></li>
                <li><a href="#" class="nav-link" data-page="communications" onclick="loadPage('communications'); return false;">
                    <i class="ph ph-chat-dots"></i><span>Communications</span>
                </a></li>
                <li><a href="#" class="nav-link" data-page="reports" onclick="loadPage('reports'); return false;">
                    <i class="ph ph-chart-line"></i><span>Reports</span>
                </a></li>
            </ul>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">AO</div>
                <div class="user-info">
                    <p class="name" id="user-name">Admin User</p>
                    <p class="role" id="user-role">Admin</p>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="content">
            <header class="top-bar">
                <div class="header-left">
                    <h1 id="page-title" class="page-title">Dashboard</h1>
                    <p id="page-subtitle" class="page-subtitle">
                        <span id="estate-name"></span>
                        <a href="#" id="estate-edit-link" onclick="loadPage('estate'); return false;"
                           style="margin-left:8px;color:var(--primary);text-decoration:none;font-weight:600;display:none;">Edit</a>
                    </p>
                </div>
                <div class="header-right">
                    <div class="date-time-display">
                        <i class="ph ph-calendar-blank"></i>
                        <span id="current-date-time">Loading...</span>
                    </div>
                    <button id="logout-btn" class="logout-btn" title="Logout">
                        <i class="ph ph-sign-out"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </header>

            <div id="page-container" class="main-content">
                <!-- Dashboard content will load here -->
            </div>


        </main>
    </div>

    <!-- BOTTOM NAV (mobile only — hidden on desktop via CSS) -->
    <nav class="bottom-nav" style="display:none;">
        <button class="bottom-nav-item active" data-page="dashboard" onclick="loadPage('dashboard')">
            <i class="ph ph-squares-four"></i><span>Home</span>
        </button>
        <button class="bottom-nav-item" data-page="residents" onclick="loadPage('residents')">
            <i class="ph ph-users"></i><span>Residents</span>
        </button>
        
        <button class="bottom-nav-item" data-page="payments" onclick="loadPage('payments')">
            <i class="ph ph-hand-coins"></i><span>Payments</span>
        </button>
        <button class="bottom-nav-item" data-page="invoices" onclick="loadPage('invoices')">
            <i class="ph ph-receipt"></i><span>Invoices</span>
        </button>
        <button class="bottom-nav-item" data-page="collections" onclick="loadPage('collections')">
            <i class="ph ph-warning-circle"></i><span>Collections</span>
        </button>
        <button class="bottom-nav-item" data-page="reports" onclick="loadPage('reports')">
            <i class="ph ph-chart-line"></i><span>Reports</span>
        </button>
    </nav>

    <script src="/js/index.js"></script>
</body>
</html>
