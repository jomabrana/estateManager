<div class="page-actions">
    <button class="btn btn-primary" onclick="openModal('invoice-modal')">
        <i class="ph ph-plus"></i> Create Invoice
    </button>
    <button class="btn btn-secondary" onclick="openModal('bulk-invoice-modal')">
        <i class="ph ph-stack"></i> Bulk Generate
    </button>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Invoices</h2>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Invoice ID</th>
                    <th>Resident</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="invoices-tbody">
                <tr><td colspan="6" style="text-align: center; padding: 40px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="invoice-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Create Invoice</div>
        <form id="invoice-form">
            <div class="form-group">
                <label>Resident/Unit *</label>
                <select id="invoice-resident" required style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px;">
                    <option value="">Select...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (KES) *</label>
                <input type="number" id="invoice-amount" placeholder="5500" required>
            </div>
            <div class="form-group">
                <label>Due Date *</label>
                <input type="date" id="invoice-due-date" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('invoice-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>

<div id="bulk-invoice-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Bulk Generate Invoices</div>
        <form id="bulk-invoice-form">
            <div class="form-group">
                <label>Amount per Unit (KES) *</label>
                <input type="number" id="bulk-amount" placeholder="5500" required>
            </div>
            <div class="form-group">
                <label>Due Date *</label>
                <input type="date" id="bulk-due-date" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('bulk-invoice-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Generate</button>
            </div>
        </form>
    </div>
</div>
