<div class="page-actions">
    <button class="btn btn-secondary" onclick="exportCollections()">
        <i class="ph ph-export"></i> Export Collections
    </button>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Overdue & Collections</h2>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Resident</th>
                    <th>Unit</th>
                    <th>Outstanding Amount</th>
                    <th>Days Overdue</th>
                    <th>Last Payment</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="collections-tbody">
                <tr><td colspan="7" style="text-align: center; padding: 40px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="collection-note-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Add Collection Note</div>
        <form id="collection-note-form">
            <div class="form-group">
                <label>Note</label>
                <textarea id="collection-note-text" style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit;"></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('collection-note-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Note</button>
            </div>
        </form>
    </div>
</div>
