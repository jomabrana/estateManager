<div class="card">
    <div class="card-header">
        <h2 class="card-title">Estate Settings</h2>
    </div>
    <form id="estate-form" style="padding: 24px;">
        <div class="form-group">
            <label>Estate Name *</label>
            <input type="text" id="estate-name" required>
        </div>
        <div class="form-group">
            <label>Location *</label>
            <input type="text" id="estate-location" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="estate-description" style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit;"></textarea>
        </div>
        <div class="form-group">
            <label>Number of Units</label>
            <input type="number" id="estate-units" min="0">
        </div>
        <div class="form-group">
            <label>Admin Contact Email</label>
            <input type="email" id="estate-email">
        </div>
        <div class="form-group">
            <label>Admin Phone</label>
            <input type="tel" id="estate-phone">
        </div>
        <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="loadPage('dashboard')">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Estate Settings</button>
        </div>
    </form>
</div>
