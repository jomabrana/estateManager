<!-- backend/public/pages/residents.html -->
<!-- NO html, head, body tags! Just content -->

<div class="page-actions">
    <button class="btn btn-primary" onclick="openModal('resident-modal')">
        <i class="ph ph-user-plus"></i> Add Resident
    </button>
</div>

<div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 24px;">
    <input type="text" id="search-residents" placeholder="Search residents..." style="flex: 1; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem;">
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">All Residents & Units</h2>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Unit</th>
                    <th>Type</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="residents-tbody">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 40px;">Loading residents...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Resident Modal -->
<div id="resident-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Add Resident</div>
        <form id="resident-form">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="resident-name" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="resident-email" required>
            </div>
            
            <div class="form-group">
                <label>Unit Number *</label>
                <input type="text" id="resident-unit" placeholder="e.g., A-01" required>
            </div>
            
            <div class="form-group">
                <label>Occupancy Type</label>
                <select id="resident-type" style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit;">
                    <option value="OWNER_OCCUPIER">Owner Occupier</option>
                    <option value="TENANT">Tenant</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="resident-phone" placeholder="+254...">
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('resident-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Resident</button>
            </div>
        </form>
    </div>
</div>
