<!-- public/residents.html — no html/head/body tags -->

<link rel="stylesheet" href="/backend/public/styles/residents.css">

<div class="page-actions">
  <a href="/add-resident.html" class="btn btn-primary">
    <i class="ph ph-user-plus"></i> Add Resident
</a>
  <button class="btn btn-secondary" onclick="exportResidentsCSV()">
    <i class="ph ph-export"></i> Export CSV
  </button>
</div>

<!-- COUNTERS + SEARCH BAR -->
<div style="margin-bottom:24px;">
  <!-- counters row -->
  <div style="display:flex;flex-direction:row;gap:12px;margin-bottom:12px;">
    <div style="background:white;border:1px solid var(--border-color);border-radius:12px;padding:10px 14px;display:flex;flex-direction:row;align-items:center;gap:10px;box-shadow:var(--card-shadow);flex:1;">
      <div class="icon-bg blue" style="width:36px;height:36px;font-size:18px;flex-shrink:0;"><i class="ph ph-house"></i></div>
      <div>
        <p class="counter-label">Units</p>
        <p class="counter-value"><span id="counter-units">0</span><span class="counter-of" id="counter-units-of"></span></p>
      </div>
    </div>
    <div style="background:white;border:1px solid var(--border-color);border-radius:12px;padding:10px 14px;display:flex;flex-direction:row;align-items:center;gap:10px;box-shadow:var(--card-shadow);flex:1;">
      <div class="icon-bg green" style="width:36px;height:36px;font-size:18px;flex-shrink:0;"><i class="ph ph-users"></i></div>
      <div>
        <p class="counter-label">Active Residents</p>
        <p class="counter-value" id="counter-residents">0</p>
      </div>
    </div>
    <div style="background:white;border:1px solid var(--border-color);border-radius:12px;padding:10px 14px;display:flex;flex-direction:row;align-items:center;gap:10px;box-shadow:var(--card-shadow);flex:1;">
      <div class="icon-bg orange" style="width:36px;height:36px;font-size:18px;flex-shrink:0;"><i class="ph ph-user-minus"></i></div>
      <div>
        <p class="counter-label">Inactive</p>
        <p class="counter-value" id="counter-inactive">0</p>
      </div>
    </div>
    <div style="background:white;border:1px solid var(--border-color);border-radius:12px;padding:10px 14px;display:flex;flex-direction:row;align-items:center;gap:10px;box-shadow:var(--card-shadow);flex:1;">
      <div class="icon-bg purple" style="width:36px;height:36px;font-size:18px;flex-shrink:0;"><i class="ph ph-house-line"></i></div>
      <div>
        <p class="counter-label">Vacant Units</p>
        <p class="counter-value" id="counter-vacant">0</p>
      </div>
    </div>
  </div>
  <!-- search below -->
  <input type="text" id="search-residents"
    placeholder="Search by name, unit, email..."
    oninput="filterResidents(this.value)"
    style="padding:10px 16px;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;width:100%;font-family:inherit;box-sizing:border-box;">
</div>

<div class="card">
  <div class="card-header">
    <h2 class="card-title">All Residents & Units</h2>
    <span class="resident-count" id="resident-count">0 residents</span>
  </div>
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Unit</th>
          <th>Resident Name</th>
          <th>Type</th>
          <th>Emails</th>
          <th>Phones</th>
          <th>Monthly Charge</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="residents-tbody">
        <tr><td colspan="8" class="table-loading">Loading residents...</td></tr>
      </tbody>
    </table>
  </div>
</div>
