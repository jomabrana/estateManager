<div class="page-actions">
    <button class="btn btn-primary" onclick="openModal('payment-modal')">
        <i class="ph ph-plus"></i> Record Payment
    </button>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">All Payments</h2>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Resident</th>
                    <th>Unit</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="payments-tbody">
                <tr><td colspan="7" style="text-align: center; padding: 40px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Record Payment</div>
        <form id="payment-form">
            <div class="form-group">
                <label>Resident/Invoice *</label>
                <select id="payment-invoice" required style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px;">
                    <option value="">Select...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (KES) *</label>
                <input type="number" id="payment-amount" placeholder="5500" required>
            </div>
            <div class="form-group">
                <label>Payment Method *</label>
                <select id="payment-method" required style="width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px;">
                    <option value="MPESA">M-Pesa</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                    <option value="CASH">Cash</option>
                    <option value="CHECK">Check</option>
                </select>
            </div>
            <div class="form-group">
                <label>Payment Date *</label>
                <input type="date" id="payment-date" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('payment-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Record</button>
            </div>
        </form>
    </div>
</div>
